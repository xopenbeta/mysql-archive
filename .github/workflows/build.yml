name: "Build MySQL packages"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.os_name }} - ${{ matrix.target_arch }} - MySQL ${{ matrix.mysql_version }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ���� macOS / arm64 ������������������������������������������������������������������������������������
          - os_name: macos
            target_arch: arm64
            runner: macos-14
            mysql_version: '9.7.0'
          - os_name: macos
            target_arch: arm64
            runner: macos-14
            mysql_version: '8.4.7'
          - os_name: macos
            target_arch: arm64
            runner: macos-14
            mysql_version: '5.7.44'
          # ���� macOS / x86_64��Rosetta ������룩������������������������������������������
          - os_name: macos
            target_arch: x86_64
            runner: macos-14
            mysql_version: '9.7.0'
          - os_name: macos
            target_arch: x86_64
            runner: macos-14
            mysql_version: '8.4.7'
          - os_name: macos
            target_arch: x86_64
            runner: macos-14
            mysql_version: '5.7.44'
          # ���� Linux / arm64 ������������������������������������������������������������������������������������
          - os_name: linux
            target_arch: arm64
            runner: ubuntu-24.04-arm
            mysql_version: '9.7.0'
          - os_name: linux
            target_arch: arm64
            runner: ubuntu-24.04-arm
            mysql_version: '8.4.7'
          - os_name: linux
            target_arch: arm64
            runner: ubuntu-24.04-arm
            mysql_version: '5.7.44'
          # ���� Linux / x86_64 ����������������������������������������������������������������������������������
          - os_name: linux
            target_arch: x86_64
            runner: ubuntu-24.04
            mysql_version: '9.7.0'
          - os_name: linux
            target_arch: x86_64
            runner: ubuntu-24.04
            mysql_version: '8.4.7'
          - os_name: linux
            target_arch: x86_64
            runner: ubuntu-24.04
            mysql_version: '5.7.44'
          # ���� Windows / x86_64 ������������������������������������������������������������������������������
          - os_name: windows
            target_arch: x86_64
            runner: windows-latest
            mysql_version: '9.7.0'
          - os_name: windows
            target_arch: x86_64
            runner: windows-latest
            mysql_version: '8.4.7'
          - os_name: windows
            target_arch: x86_64
            runner: windows-latest
            mysql_version: '5.7.44'

    steps:
      - uses: actions/checkout@v4

      # ���� macOS ��������������������������������������������������������������������������������������������������������������
      - name: Run build script (macOS)
        if: matrix.os_name == 'macos'
        run: |
          chmod +x ./scripts/build-macos.sh
          ./scripts/build-macos.sh "${{ matrix.target_arch }}" "${{ matrix.mysql_version }}"

      # ���� Linux ��������������������������������������������������������������������������������������������������������������
      - name: Run build script (Linux)
        if: matrix.os_name == 'linux'
        run: |
          chmod +x ./scripts/build-linux.sh
          ./scripts/build-linux.sh "${{ matrix.target_arch }}" "${{ matrix.mysql_version }}"

      # ���� Windows ����������������������������������������������������������������������������������������������������������
      - name: Run build script (Windows)
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          .\scripts\build-windows.ps1 -Arch "${{ matrix.target_arch }}" -MysqlVersion "${{ matrix.mysql_version }}"

      # ���� Upload artifacts ����������������������������������������������������������������������������������������
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mysql-${{ matrix.mysql_version }}-${{ matrix.os_name }}-${{ matrix.target_arch }}
          path: dist-artifacts/mysql-${{ matrix.mysql_version }}-${{ matrix.os_name }}-${{ matrix.target_arch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.tar.gz
            **/*.tar.gz.sha256
            **/*.zip
            **/*.zip.sha256
          generate_release_notes: true
