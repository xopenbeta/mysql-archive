name: "Build MySQL packages"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.os_name }} - ${{ matrix.target_arch }} - MySQL ${{ matrix.mysql_version }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ęĄęĄ macOS / arm64 ęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄ
          - os_name: macos
            target_arch: arm64
            runner: macos-14
            mysql_version: '8.0.46'
          - os_name: macos
            target_arch: arm64
            runner: macos-14
            mysql_version: '8.4.9'
          # ęĄęĄ macOS / x86_64úĘRosetta Ż╗▓Š▒ÓĎŰúęęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄ
          - os_name: macos
            target_arch: x86_64
            runner: macos-14
            mysql_version: '8.0.46'
          - os_name: macos
            target_arch: x86_64
            runner: macos-14
            mysql_version: '8.4.9'
          # ęĄęĄ Linux / arm64 ęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄ
          - os_name: linux
            target_arch: arm64
            runner: ubuntu-24.04-arm
            mysql_version: '8.0.46'
          - os_name: linux
            target_arch: arm64
            runner: ubuntu-24.04-arm
            mysql_version: '8.4.9'
          # ęĄęĄ Linux / x86_64 ęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄ
          - os_name: linux
            target_arch: x86_64
            runner: ubuntu-24.04
            mysql_version: '8.0.46'
          - os_name: linux
            target_arch: x86_64
            runner: ubuntu-24.04
            mysql_version: '8.4.9'
          # ęĄęĄ Windows / arm64 ęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄ
          - os_name: windows
            target_arch: arm64
            runner: windows-11-arm
            mysql_version: '8.0.46'
          - os_name: windows
            target_arch: arm64
            runner: windows-11-arm
            mysql_version: '8.4.9'
          # ęĄęĄ Windows / x86_64 ęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄ
          - os_name: windows
            target_arch: x86_64
            runner: windows-latest
            mysql_version: '8.0.46'
          - os_name: windows
            target_arch: x86_64
            runner: windows-latest
            mysql_version: '8.4.9'

    steps:
      - uses: actions/checkout@v4

      # ęĄęĄ macOS ęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄ
      - name: Run build script (macOS)
        if: matrix.os_name == 'macos'
        run: |
          chmod +x ./scripts/build-macos.sh
          ./scripts/build-macos.sh "${{ matrix.target_arch }}" "${{ matrix.mysql_version }}"

      # ęĄęĄ Linux ęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄ
      - name: Run build script (Linux)
        if: matrix.os_name == 'linux'
        run: |
          chmod +x ./scripts/build-linux.sh
          ./scripts/build-linux.sh "${{ matrix.target_arch }}" "${{ matrix.mysql_version }}"

      # ęĄęĄ Windows ęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄ
      - name: Run build script (Windows)
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          .\scripts\build-windows.ps1 -Arch "${{ matrix.target_arch }}" -MysqlVersion "${{ matrix.mysql_version }}"

      # ęĄęĄ Upload artifacts ęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄęĄ
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mysql-${{ matrix.mysql_version }}-${{ matrix.os_name }}-${{ matrix.target_arch }}
          path: dist-artifacts/mysql-${{ matrix.mysql_version }}-${{ matrix.os_name }}-${{ matrix.target_arch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.tar.gz
            **/*.tar.gz.sha256
            **/*.zip
            **/*.zip.sha256
          generate_release_notes: true
