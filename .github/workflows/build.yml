name: "Build macOS MySQL packages"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.mysql_version }} / ${{ matrix.target_arch }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - mysql_version: '8.0.41'
            target_arch: 'arm64'
          - mysql_version: '8.0.41'
            target_arch: 'x86_64'
          - mysql_version: '8.4.4'
            target_arch: 'arm64'
          - mysql_version: '8.4.4'
            target_arch: 'x86_64'

    steps:
      - uses: actions/checkout@v4

      - name: Make build script executable
        run: chmod +x ./scripts/build-macos.sh

      - name: Run build script
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -eux
          ./scripts/build-macos.sh "${{ matrix.target_arch }}" "${{ matrix.mysql_version }}"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: mysql-${{ matrix.mysql_version }}-${{ matrix.target_arch }}
          path: dist-artifacts/mysql-${{ matrix.mysql_version }}-macos-${{ matrix.target_arch }}.tar.gz

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: mysql-${{ matrix.mysql_version }}-${{ matrix.target_arch }}-sha256
          path: dist-artifacts/mysql-${{ matrix.mysql_version }}-macos-${{ matrix.target_arch }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.tar.gz
            **/*.tar.gz.sha256
          generate_release_notes: true
